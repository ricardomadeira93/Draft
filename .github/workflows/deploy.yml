name: CI Pipeline

# 1. Triggers: When should this workflow run?
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  # 2. Web Check Job: Validates the Next.js Frontend
  web-check:
    runs-on: ubuntu-latest
    # Only run if files in draft-web were changed
    defaults:
      run:
        working-directory: ./draft-web

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './draft-web/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  # 3. API Check Job: Validates the FastAPI Backend
  api-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./draft-api

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install Dependencies
        run: uv pip install -r requirements.txt --system
