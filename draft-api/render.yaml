services:
  - type: web
    name: draft-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: GROQ_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
